<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrapper">
    <header>
      <h1 class="logo">⛅ Instant Weather</h1>
      <p class="tagline">Météo française en temps réel</p>
    </header>

    <main>
      <div class="card">
        <div id="cityForm">
          <div class="form-group">
            <label for="codePostal">Code postal</label>
            <input type="text" id="codePostal" placeholder="ex : 75001" maxlength="5" pattern="[0-9]{5}"
              inputmode="numeric" autocomplete="off" />
          </div>

          <div id="communeStep" class="hidden-step">
            <div class="form-group">
              <label for="commune">Sélectionnez votre ville</label>
              <select id="commune">
                <option value="">— recherche en cours —</option>
              </select>
            </div>
            <button class="btn" id="searchBtn" type="button">
              Afficher la météo
            </button>
          </div>
        </div>

        <div class="loader" id="loader">
          <div class="spinner"></div>
          Chargement des données...
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="result" id="result">
          <div class="result-header">
            <div class="result-city" id="resultCity"></div>
            <div class="result-date" id="resultDate"></div>
          </div>
          <div class="metrics" id="metrics"></div>
          <button class="btn btn-outline" id="reloadBtn" style="margin-top: 2rem;">
            ← Nouvelle recherche
          </button>
        </div>
      </div>
    </main>

    <footer>
      <p>Données officielles : <a href="https://api.meteo-concept.com/" target="_blank">MétéoConcept</a> & <a
          href="https://geo.api.gouv.fr/" target="_blank">Etalab</a></p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>

</html>
